<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counting Down To You</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Georgia", serif;
      background:
        radial-gradient(circle at top, rgba(255, 210, 220, 0.45), transparent 35%),
        linear-gradient(135deg, #160019, #3b0a2a, #741c3f);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .heart {
      position: absolute;
      color: rgba(255, 210, 220, 0.5);
      animation: floatUp 9s linear infinite;
      font-size: 18px;
    }

    @keyframes floatUp {
      from {
        transform: translateY(110vh) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      to {
        transform: translateY(-20vh) scale(1.4);
        opacity: 0;
      }
    }

    .card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 760px;
      padding: 44px 28px;
      border-radius: 32px;
      text-align: center;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.22);
    }

    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.16);
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(34px, 7vw, 68px);
      line-height: 1.05;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .message {
      max-width: 620px;
      margin: 0 auto 34px;
      font-family: Arial, sans-serif;
      font-size: clamp(16px, 2.6vw, 20px);
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.88);
    }

    .timer {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 30px 0;
    }

    .box {
      padding: 22px 10px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .number {
      display: block;
      font-family: Arial, sans-serif;
      font-size: clamp(30px, 7vw, 58px);
      font-weight: 700;
    }

    .label {
      margin-top: 6px;
      display: block;
      font-family: Arial, sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.76);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .footer {
      margin-top: 26px;
      font-family: Arial, sans-serif;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.8);
    }

    .arrival {
      display: none;
      margin-top: 30px;
      font-size: clamp(24px, 5vw, 42px);
      line-height: 1.3;
    }

    @media (max-width: 560px) {
      .timer {
        grid-template-columns: repeat(2, 1fr);
      }

      .card {
        padding: 34px 20px;
      }
    }
  </style>
</head>

<body>
  <div class="hearts" id="hearts"></div>

  <main class="card">

    <h1>Counting down for you</h1>

    <p class="message">
      Some moments deserve their own countdown.  
      This one ends when you walk through the door.
    </p>

    <section class="timer" id="timer">
      <div class="box">
        <span class="number" id="days">00</span>
        <span class="label">Days</span>
      </div>
      <div class="box">
        <span class="number" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="box">
        <span class="number" id="minutes">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="box">
        <span class="number" id="seconds">00</span>
        <span class="label">Seconds</span>
      </div>
    </section>

    <div class="arrival" id="arrival">
      You’re here. And honestly, that’s the best part of the day. 🤍
    </div>

    <p class="footer">
      Till 11:30 PM, every second is just me waiting a little more.
    </p>
  </main>

  <script>
    // Target: 11:30 PM IST on 9 July 2026
    const targetDate = new Date("2026-07-09T23:30:00+05:30").getTime();

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const timerEl = document.getElementById("timer");
    const arrivalEl = document.getElementById("arrival");

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function updateTimer() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        timerEl.style.display = "none";
        arrivalEl.style.display = "block";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      daysEl.textContent = pad(days);
      hoursEl.textContent = pad(hours);
      minutesEl.textContent = pad(minutes);
      secondsEl.textContent = pad(seconds);
    }

    updateTimer();
    setInterval(updateTimer, 1000);

    // Floating hearts
    const heartsContainer = document.getElementById("hearts");

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.textContent = "♡";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = 6 + Math.random() * 6 + "s";
      heart.style.fontSize = 14 + Math.random() * 22 + "px";
      heartsContainer.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 12000);
    }

    setInterval(createHeart, 500);
  </script>
</body>
</html>
